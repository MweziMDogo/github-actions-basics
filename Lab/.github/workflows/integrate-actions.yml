#name: Integrate Actions
on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - master
jobs:
  test-pull-request:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node_version: [16.x, 18.x]
    steps:
      - uses: actions/checkout@v3
      - name: use Node.js ${{matrix.node_version}}
        uses: actions/setup_node@v3
        with:
          node_version: $${{matrix.node_version}}
      - run: npm ci
      - run: npm test
